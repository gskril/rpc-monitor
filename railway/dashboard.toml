[build]
builder = "RAILPACK"
buildCommand = "bun install && bun run build:dashboard"
watchPatterns = [
  "/railway/dashboard.toml",
  "/packages/dashboard/**",
  "/packages/shared/**",
  "/package.json",
  "/bun.lock",
  "/tsconfig.base.json",
]

[deploy]
startCommand = "bun run dashboard:server"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
overlapSeconds = 10
drainingSeconds = 30
