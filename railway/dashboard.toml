[build]
builder = "RAILPACK"
buildCommand = "bun install && bun --cwd packages/dashboard run build"
watchPatterns = [
  "/railway/dashboard.toml",
  "/packages/dashboard/**",
  "/packages/shared/**",
  "/package.json",
  "/bun.lock",
  "/tsconfig.base.json",
]

[deploy]
startCommand = "bun --cwd packages/dashboard run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
overlapSeconds = 10
drainingSeconds = 30
